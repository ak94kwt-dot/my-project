<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الديوانية — اعرف ردة فعل جمهورك قبل لا تنشر</title>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0E6B54; --dteal:#0A4537; --gold:#B8862F; --sand:#F3EEE3;
    --char:#2E2A24; --white:#FFFFFF; --safe:#1D9E75; --warn:#BA7517;
    --danger:#C0392B; --mute:#897F6E; --line:#E2DACB; --card:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Readex Pro',sans-serif;background:var(--sand);color:var(--char);line-height:1.7;}
  #dw-root{min-height:100vh;}

  /* الهيدر */
  .dw-header{display:flex;justify-content:space-between;align-items:center;
    padding:16px 6%;background:var(--dteal);position:sticky;top:0;z-index:50;}
  .dw-logo{font-size:22px;font-weight:700;color:var(--white);}
  .dw-shield{color:var(--gold);}
  .dw-nav{display:flex;align-items:center;gap:18px;}
  .dw-navlink{color:#CFE3DC;text-decoration:none;font-size:14px;transition:.15s;}
  .dw-navlink:hover{color:var(--white);}
  .dw-cta-sm{background:var(--gold);color:var(--white);border:none;border-radius:10px;
    padding:9px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
  .dw-cta-sm:hover{background:#a5751f;}

  /* الهيرو */
  .dw-hero{background:var(--dteal);color:var(--white);text-align:center;
    padding:50px 6% 70px;position:relative;overflow:hidden;}
  .dw-hero::before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;
    background:var(--teal);top:-120px;left:-80px;opacity:.5;}
  .dw-hero-badge{display:inline-block;background:rgba(184,134,47,.2);color:var(--gold);
    border:1px solid var(--gold);border-radius:20px;padding:5px 14px;font-size:12px;
    font-weight:600;margin-bottom:18px;position:relative;}
  .dw-hero-title{font-size:38px;font-weight:700;line-height:1.4;margin-bottom:16px;position:relative;}
  .dw-hero-sub{font-size:16px;color:#CFE3DC;max-width:560px;margin:0 auto 26px;position:relative;}
  .dw-cta-lg{background:var(--gold);color:var(--white);border:none;border-radius:13px;
    padding:15px 32px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;
    position:relative;transition:.15s;}
  .dw-cta-lg:hover{background:#a5751f;transform:translateY(-1px);}
  .dw-hero-note{margin-top:18px;font-size:14px;font-style:italic;color:var(--gold);position:relative;}

  /* الأقسام */
  .dw-section{padding:50px 6%;max-width:1100px;margin:0 auto;}
  .dw-section-alt{background:var(--white);max-width:none;}
  .dw-sec-title{font-size:28px;font-weight:700;text-align:center;color:var(--char);margin-bottom:34px;}

  /* الخطوات */
  .dw-steps{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  .dw-step{flex:1;min-width:200px;max-width:300px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:26px 20px;text-align:center;}
  .dw-step-num{width:54px;height:54px;border-radius:50%;background:var(--teal);color:var(--white);
    font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .dw-step-title{font-size:18px;font-weight:600;margin-bottom:6px;}
  .dw-step-desc{font-size:13px;color:var(--mute);}

  /* المميّزات */
  .dw-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;max-width:1000px;margin:0 auto;}
  .dw-feature{background:var(--sand);border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;}
  .dw-feature-icon{font-size:34px;margin-bottom:12px;}
  .dw-feature-title{font-size:17px;font-weight:600;color:var(--teal);margin-bottom:8px;}
  .dw-feature-desc{font-size:13px;color:#5A5142;}

  /* التطبيق */
  .dw-app{padding:50px 6%;max-width:560px;margin:0 auto;}
  .dw-app-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;}
  .dw-input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:14px;
    font-family:inherit;font-size:14px;resize:vertical;min-height:100px;color:var(--char);background:#FCFAF5;}
  .dw-input:focus{outline:none;border-color:var(--teal);}
  .dw-chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .dw-chip{background:var(--sand);border:1px solid var(--line);border-radius:20px;padding:7px 13px;
    font-size:11.5px;cursor:pointer;transition:.15s;color:#6B6354;}
  .dw-chip:hover{background:var(--teal);color:var(--white);border-color:var(--teal);}
  .dw-run{width:100%;background:var(--teal);color:var(--white);border:none;border-radius:13px;
    padding:15px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;transition:.15s;}
  .dw-run:hover{background:#0a5743;}

  /* التشاور */
  .dw-result{margin-top:20px;}
  .dw-thinking{text-align:center;padding:34px 0;}
  .dw-think-text{font-size:16px;color:var(--teal);font-weight:600;}
  .dw-dots{display:inline-flex;gap:7px;margin-top:14px;}
  .dw-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);animation:dwb 1.2s infinite;}
  .dw-dot:nth-child(2){animation-delay:.2s;}
  .dw-dot:nth-child(3){animation-delay:.4s;}
  @keyframes dwb{0%,80%,100%{opacity:.25;transform:scale(.85);}40%{opacity:1;transform:scale(1.1);}}

  /* النتيجة */
  .dw-verdict{text-align:center;padding:18px;border-radius:14px;margin-bottom:14px;color:var(--white);}
  .dw-verdict-v{font-size:26px;font-weight:700;}
  .dw-verdict-r{font-size:13px;opacity:.95;margin-top:4px;}
  .dw-dials{display:flex;gap:10px;margin-bottom:14px;}
  .dw-dial{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;text-align:center;}
  .dw-dial-lbl{font-size:11px;color:var(--mute);}
  .dw-dial-num{font-size:24px;font-weight:700;margin-top:3px;}
  .dw-split{display:flex;height:32px;border-radius:9px;overflow:hidden;margin-bottom:6px;border:1px solid var(--line);}
  .dw-split div{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--white);font-weight:600;}
  .dw-split-lbl{font-size:11px;color:var(--mute);text-align:center;margin-bottom:14px;}
  .dw-radar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
  .dw-radar-chip{border-radius:16px;padding:5px 12px;font-size:11px;font-weight:600;}
  .dw-radar-on{background:#FBEDEB;color:var(--danger);border:1px solid #E8C5C0;}
  .dw-radar-off{background:#EAF5F0;color:var(--safe);border:1px solid #C5E5D8;}
  .dw-voices-title{font-size:14px;font-weight:600;color:var(--teal);margin-bottom:11px;}
  .dw-voices{display:flex;flex-direction:column;gap:8px;}
  .dw-voice{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;}
  .dw-voice-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .dw-voice-em{font-size:18px;}
  .dw-voice-nm{font-size:13px;font-weight:600;}
  .dw-voice-dm{font-size:10px;color:var(--white);background:var(--teal);border-radius:10px;padding:2px 8px;margin-right:auto;}
  .dw-voice-dm.dark{background:var(--danger);}
  .dw-voice-tx{font-size:12.5px;color:#4A4438;}
  .dw-edit{background:#FBF6EA;border:1px solid var(--gold);border-radius:13px;padding:14px;margin-top:12px;}
  .dw-edit-h{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:5px;}
  .dw-edit-t{font-size:12.5px;color:#5A5142;}
  .dw-conf{text-align:center;font-size:11px;color:var(--mute);margin-top:14px;}

  /* الفوتر */
  .dw-footer{background:var(--dteal);color:var(--white);text-align:center;padding:40px 6%;margin-top:30px;}
  .dw-footer-logo{font-size:22px;font-weight:700;margin-bottom:8px;}
  .dw-footer-tag{font-size:14px;color:#CFE3DC;margin-bottom:14px;}
  .dw-footer-note{font-size:11px;color:#7FA99D;}

  /* موبايل */
  @media(max-width:600px){
    .dw-hero-title{font-size:30px;}
    .dw-sec-title{font-size:24px;}
    .dw-nav{gap:10px;}
    .dw-navlink{display:none;}
  }
</style>
</head>
<body>
  <div id="dw-root"></div>

  <!-- المحرّك أولاً (يعرّض نفسه على window.DiwaniyaEngine)، ثم التطبيق -->
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
